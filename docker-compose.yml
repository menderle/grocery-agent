# Portable deployment: same stack on this Mac, a Mac mini, or a VPS.
# Restore a `make snapshot` tarball into ./state first, then: docker compose up -d
services:
  heb-checkout:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"   # reachable only via the cloudflared tunnel
    environment:
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:?set in .env}
      HEB_CHECKOUT_DRY_RUN: ${HEB_CHECKOUT_DRY_RUN:-true}
    volumes:
      - ./config:/data/agent/config
      - ./data:/data/agent/data
      - ./state/auth:/data/auth

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set in .env}
    depends_on:
      - heb-checkout
